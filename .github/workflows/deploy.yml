name: Deploy Laravel to Shared Hosting

on:
  push:
    branches:
      - main # Memicu deploy otomatis setiap kali melakukan push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup Node dan Build Asset Vite di GitHub Runner
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build NPM Assets
        run: |
          npm ci
          npm run build

      # 2. Langkah SSH untuk masuk ke cPanel dan menjalankan perintah pembaruan
      - name: Execute SSH Commands on cPanel
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/mindfit_app

            # Tarik kode terbaru dari GitHub
            git pull origin main

            # Pasang dependensi PHP (optimize autoloader)
            composer install --no-dev --optimize-autoloader

            # Jalankan migrasi database
            php artisan migrate --force

            # Buat link storage jika belum ada
            php artisan storage:link || true

            # Bersihkan SEMUA cache lama (config, route, view, event)
            php artisan optimize:clear
            php artisan view:clear

            # Buat cache konfigurasi/route baru
            php artisan optimize

      # 3. Upload folder public/build hasil compile ke server via SCP
      - name: Upload compiled assets via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "public/build"
          target: "~/mindfit_app"
