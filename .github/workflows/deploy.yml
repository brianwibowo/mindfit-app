name: Deploy Laravel to Shared Hosting

on:
  push:
    branches:
      - main # Memicu deploy otomatis setiap kali melakukan push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup Node dan Build Asset Vite di GitHub Runner
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build NPM Assets
        run: |
          npm ci
          npm run build

      # 2. Upload public/build ke cPanel via SCP
      - name: Upload compiled assets via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "public/build"
          target: "~/mindfit_app"

      # 3. Langkah SSH untuk masuk ke cPanel dan menjalankan perintah pembaruan
      - name: Execute SSH Commands on cPanel
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/mindfit_app

            # Tarik kode terbaru dari GitHub
            git pull origin main

            # Cari PHP 8.x binary yang tersedia di cPanel
            PHP_BIN=$(which php)
            if [ -f /opt/cpanel/ea-php84/root/usr/bin/php ]; then
              PHP_BIN=/opt/cpanel/ea-php84/root/usr/bin/php
            elif [ -f /usr/local/bin/ea-php84 ]; then
              PHP_BIN=/usr/local/bin/ea-php84
            elif [ -f /opt/cpanel/ea-php83/root/usr/bin/php ]; then
              PHP_BIN=/opt/cpanel/ea-php83/root/usr/bin/php
            elif [ -f /opt/cpanel/ea-php82/root/usr/bin/php ]; then
              PHP_BIN=/opt/cpanel/ea-php82/root/usr/bin/php
            fi
            echo "Using PHP: $PHP_BIN"
            $PHP_BIN -v

            # Cari composer / download composer.phar jika belum ada
            if [ ! -f composer.phar ]; then
              $PHP_BIN -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
              $PHP_BIN composer-setup.php
              $PHP_BIN -r "unlink('composer-setup.php');"
            fi

            # Install Composer Dependencies dengan memory limit unlimited
            $PHP_BIN -d memory_limit=-1 composer.phar install --no-dev --optimize-autoloader

            # Jalankan migrasi database
            $PHP_BIN artisan migrate --force

            # Buat storage link di mindfit_app/public
            if [ -d public/storage ] && [ ! -L public/storage ]; then
              rm -rf public/storage
            fi
            $PHP_BIN artisan storage:link || true

            # SYNC KE DOCUMENT ROOT PUBLIC_HTML (app.mindfit.id)
            PUBLIC_HTML_DIR="/home/omag8228/public_html/app.mindfit.id"
            if [ -d "$PUBLIC_HTML_DIR" ]; then
              echo "Syncing public files to $PUBLIC_HTML_DIR..."
              cp -ru ~/mindfit_app/public/* "$PUBLIC_HTML_DIR/" 2>/dev/null || true
              rm -rf "$PUBLIC_HTML_DIR/storage"
              ln -s ~/mindfit_app/storage/app/public "$PUBLIC_HTML_DIR/storage"
              echo "Storage symlink created at $PUBLIC_HTML_DIR/storage"
            fi

            # Bersihkan SEMUA cache lama (config, route, view, event)
            $PHP_BIN artisan optimize:clear
            $PHP_BIN artisan view:clear

            # Buat cache konfigurasi/route baru
            $PHP_BIN artisan optimize
