name: Deploy Laravel to Shared Hosting

on:
  push:
    branches:
      - main # Memicu deploy otomatis setiap kali melakukan push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup PHP & Composer di GitHub Runner
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, zip, gd, pdo_mysql

      - name: Install Composer Dependencies
        run: |
          composer install --no-dev --optimize-autoloader

      # 2. Setup Node dan Build Asset Vite di GitHub Runner
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build NPM Assets
        run: |
          npm ci
          npm run build

      # 3. Upload vendor & public/build ke cPanel via SCP
      - name: Upload compiled vendor & assets via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "vendor,public/build"
          target: "~/mindfit_app"

      # 4. Langkah SSH untuk masuk ke cPanel dan menjalankan perintah artisan
      - name: Execute SSH Commands on cPanel
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/mindfit_app

            # Tarik kode terbaru dari GitHub
            git pull origin main

            # Cari PHP 8.x binary yang tersedia di cPanel
            PHP_BIN=$(which php)
            if [ -f /usr/local/bin/ea-php84 ]; then
              PHP_BIN=/usr/local/bin/ea-php84
            elif [ -f /opt/cpanel/ea-php84/root/usr/bin/php ]; then
              PHP_BIN=/opt/cpanel/ea-php84/root/usr/bin/php
            elif [ -f /opt/cpanel/ea-php83/root/usr/bin/php ]; then
              PHP_BIN=/opt/cpanel/ea-php83/root/usr/bin/php
            elif [ -f /opt/cpanel/ea-php82/root/usr/bin/php ]; then
              PHP_BIN=/opt/cpanel/ea-php82/root/usr/bin/php
            fi
            echo "Using PHP: $PHP_BIN"
            $PHP_BIN -v

            # Jalankan migrasi database
            $PHP_BIN artisan migrate --force

            # Buat link storage: hapus folder lama jika bukan symlink, lalu buat symlink
            if [ -d public/storage ] && [ ! -L public/storage ]; then
              echo "public/storage is a real directory, replacing with symlink..."
              rm -rf public/storage
            fi
            $PHP_BIN artisan storage:link || true

            # Bersihkan SEMUA cache lama (config, route, view, event)
            $PHP_BIN artisan optimize:clear
            $PHP_BIN artisan view:clear

            # Buat cache konfigurasi/route baru
            $PHP_BIN artisan optimize
